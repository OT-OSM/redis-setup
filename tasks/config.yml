- name: Ensure Redis data directory exists
  file:
    path: "{{ redis_data_dir }}"
    state: directory
    owner: redis
    group: redis
    mode: '0755'

- name: Ensure Redis data directory ownership
  file:
    path: "{{ redis_data_dir }}"
    owner: redis
    group: redis
    recurse: yes

- name: Ensure Redis log directory exists
  file:
    path: "/var/log/redis"
    state: directory
    owner: redis
    group: redis
    mode: '0755'

- name: Ensure Redis log file exists
  file:
    path: "{{ redis_log_file }}"
    state: touch
    owner: redis
    group: redis
    mode: '0644'

- name: Deploy Redis configuration
  template:
    src: redis.conf.j2
    dest: "{{ redis_conf_path }}"
    owner: root
    group: root
    mode: '0644'
  notify:
    - Restart Redis
