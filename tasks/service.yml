- name: Deploy Redis systemd service
  template:
    src: redis-systemd.service.j2
    dest: "/etc/systemd/system/{{ redis_instance_service }}.service"
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart Redis

- name: Flush handlers
  meta: flush_handlers

- name: Enable Redis instance service
  systemd:
    name: "{{ redis_instance_service }}"
    enabled: yes

- name: Stop existing Redis instance if running
  systemd:
    name: "{{ redis_instance_service }}"
    state: stopped
  failed_when: false

- name: Start Redis instance
  systemd:
    name: "{{ redis_instance_service }}"
    state: started
