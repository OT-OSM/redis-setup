- name: Validate redis_mode
  assert:
    that:
      - redis_mode in ['standalone', 'replication', 'cluster']
    fail_msg: "redis_mode must be standalone, replication, or cluster"

- name: Validate redis_role
  assert:
    that:
      - redis_role in ['master', 'replica']
    fail_msg: "redis_role must be master or replica"
  when: redis_mode == "replication"

- name: Validate replica configuration
  assert:
    that:
      - redis_master_ip | length > 0
    fail_msg: "redis_master_ip is required for replica"
  when:
    - redis_mode == "replication"
    - redis_role == "replica"

- name: Validate Sentinel configuration
  assert:
    that:
      - redis_master_ip | length > 0
    fail_msg: "redis_master_ip is required when redis_sentinel_enabled=true"
  when: redis_sentinel_enabled

- name: Validate appendfsync policy
  assert:
    that:
      - redis_appendfsync in ['always', 'everysec', 'no']
    fail_msg: "redis_appendfsync must be always, everysec, or no"

- name: Validate ACL users
  assert:
    that:
      - redis_acl_users | length > 0
    fail_msg: "redis_acl_users must be defined when redis_acl_enabled=true"
  when: redis_acl_enabled


- name: Validate ACL and requirepass configuration
  assert:
    that:
      - not (redis_acl_enabled and redis_requirepass)
    fail_msg: "redis_requirepass should not be used when redis_acl_enabled=true"

